<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: sans-serif;
      width: 280px;
      padding: 12px;
      margin: 0;
    }
    #status {
      font-size: 13px;
      color: #333;
      margin-bottom: 10px;
      word-break: break-word;
    }
    #result {
      font-size: 12px;
      color: #555;
      background: #f4f4f4;
      border-radius: 4px;
      padding: 8px;
      word-break: break-word;
      display: none;
      margin-top: 8px;
    }
    .success { color: #2a7a2a; font-weight: bold; }
    .error   { color: #b00020; font-weight: bold; }
  </style>
</head>
<body>
  <div id="status">Fetching post info...</div>
  <div id="result"></div>
  <script src="popup.js"></script>
</body>
</html>
